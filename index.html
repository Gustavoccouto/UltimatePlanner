<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UltimatePlanner - Finanças & Planejamento</title>
    <meta
      name="description"
      content="Sistema pessoal premium de finanças e planejamento"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            colors: {
              brand: {
                50: "#eefaf4",
                100: "#d8f4e7",
                500: "#27c07d",
                600: "#159562",
              },
              ink: "#0f172a",
              mist: "#f4f7fb",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/components.css" />
  </head>
  <body class="bg-mist text-slate-900 font-sans antialiased">
    <div id="app-shell" class="min-h-screen">
      <aside id="sidebar" class="sidebar glass-panel hidden lg:flex"></aside>
      <div class="main-shell">
        <header id="topbar" class="topbar glass-panel"></header>
        <main id="app-main" class="app-main">
          <section id="view-root"></section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div id="drawer-root"></div>
    <div id="toast-root" class="toast-root"></div>
    <div id="command-root"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
